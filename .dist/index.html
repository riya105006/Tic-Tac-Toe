<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Full-Screen Win/Draw Overlay Screen -->
    <div id="win-screen" class="win-screen hidden">
        <h1 id="win-text">X WON!</h1>
        <button id="playAgain" class="restart-btn">Play Again</button>
    </div>

    <header>
        <h1 class="main-heading">Tic Tac Toe</h1>
    </header>

    <main class="main">
        <!-- The Ordinary Grid Game Board -->
        <section class="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </section>

        <!-- Side Control Panel -->
        <aside class="game-info">
            <div id="status">Player X's Turn</div>

            <div class="players">
                <div class="player-badge x-badge">❌ Player X</div>
                <div class="player-badge o-badge">⭕ Player O</div>
            </div>

            <button class="restart-btn">Restart Game</button>
        </aside>
    </main>

    <script src="script.js"></script>
</body>
</html>
